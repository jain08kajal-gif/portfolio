<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kajal Jain — Senior Product Designer</title>
<meta name="description" content="Portfolio of Kajal Jain, Senior Product Designer." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>

/* ─── RESET ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: #3E4A9A;
  color: #fff;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ─── NAV ────────────────────────────────────── */
nav {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 30px 60px;
  z-index: 30;
}
.logo {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.02em;
  display: inline-flex;
  align-items: center;
  gap: 2px;
}
.logo .last {
  font-weight: 300;
  opacity: 0.65;
}
.logo .dot {
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #7EB8FF;
  margin-left: 4px;
  vertical-align: middle;
}
.nav-links {
  display: flex;
  gap: 36px;
  list-style: none;
}
.nav-links a {
  font-size: 15px;
  font-weight: 400;
  color: rgba(255,255,255,0.78);
  text-decoration: none;
  transition: color .2s;
}
.nav-links a:hover { color: #fff; }

/* ─── HERO ───────────────────────────────────── */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  min-height: 680px;
  overflow: hidden;
  display: flex;
  align-items: center;
  background: linear-gradient(155deg, #4454A8 0%, #404EA4 30%, #3C4BA0 60%, #38469A 100%);
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 128px 128px;
  pointer-events: none;
  z-index: 1;
}

.hero-inner {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 1160px;
  margin: 0 auto;
  padding: 0 60px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: 48px;
}

/* ─── HERO LEFT ──────────────────────────────── */
.hero-left {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}
.hero-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  margin-bottom: 18px;
}
.hero-headline {
  font-size: clamp(38px, 5.4vw, 66px);
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -0.032em;
  margin-bottom: 18px;
}
.hero-sub {
  font-size: clamp(14px, 1.4vw, 16px);
  font-weight: 400;
  color: rgba(255,255,255,0.68);
  max-width: 360px;
  line-height: 1.7;
  margin-bottom: 32px;
}
.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 26px;
  background: rgba(8,6,24,0.6);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
  transition: all .22s ease;
}
.hero-cta:hover {
  background: rgba(8,6,24,0.78);
  transform: translateY(-1px);
}

/* ─── HERO RIGHT ─────────────────────────────── */
.hero-right {
  display: flex;
  justify-content: flex-end;
  align-items: center;
}
.hero-right img {
  width: clamp(280px, 90%, 440px);
  height: auto;
  display: block;
  border-radius: 22px;
}

/* ─── WORK SECTION ───────────────────────────── */
.work {
  padding: 64px 60px 100px;
  background: linear-gradient(180deg, #38469A 0%, #3C4A9E 100%);
}
.work-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  max-width: 1040px;
  margin: 0 auto;
}

/* ─── WORK IMAGES ────────────────────────────── */
.work-grid img {
  display: block;
  width: 100%;
  height: auto;
  border-radius: 22px;
  cursor: pointer;
  transition: transform .3s ease, box-shadow .3s ease;
}
.work-grid img:hover {
  transform: translateY(-5px);
  box-shadow: 0 22px 52px rgba(10,8,40,0.28);
}
/* Third image spans both columns */
.work-grid img.wide {
  grid-column: 1 / -1;
}

/* ─── LOGO MARQUEE ───────────────────────────── */
.marquee {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  z-index: 15;
  /* Narrow centered window — only 2-3 logos visible at once */
  width: min(520px, 60vw);
  overflow: hidden;
  padding: 28px 0;
  /* Edge fade */
  -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 14%, #000 86%, transparent 100%);
  mask-image: linear-gradient(90deg, transparent 0%, #000 14%, #000 86%, transparent 100%);
}

.marquee-track {
  display: flex;
  align-items: center;
  gap: 64px;
  width: max-content;
  animation: marquee-scroll 22s linear infinite;
  will-change: transform;
}

.marquee-track:hover {
  animation-play-state: paused;
}

@keyframes marquee-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.marquee-track img {
  display: block;
  height: 32px;
  width: auto;
  filter: brightness(0) invert(1);
  opacity: 0.72;
  flex-shrink: 0;
  transition: opacity .3s ease, transform .3s ease;
  user-select: none;
  -webkit-user-drag: none;
}

.marquee-track img.logo-lg {
  height: 42px;
}

.marquee-track img:hover {
  opacity: 1;
  transform: scale(1.08);
}

/* ─── RESPONSIVE ─────────────────────────────── */
@media (max-width: 960px) {
  nav { padding: 24px 36px; }
  .hero-inner { padding: 0 36px; gap: 32px; }
  .work { padding: 56px 36px 80px; }
}
@media (max-width: 768px) {
  nav { padding: 20px 24px; }
  .nav-links { gap: 20px; }
  /* Hero becomes content-driven height on mobile — no overlap */
  .hero {
    height: auto;
    min-height: 0;
    padding: 0 0 24px;
  }
  .hero-inner {
    grid-template-columns: 1fr;
    padding: 96px 24px 0;
    align-items: flex-start;
  }
  .hero-right { justify-content: center; }
  .hero-right img { width: clamp(260px, 70%, 400px); }
  /* Marquee flows naturally below content */
  .marquee {
    position: relative;
    left: auto;
    transform: none;
    width: 100%;
    margin-top: 40px;
  }
  .work { padding: 48px 24px 72px; }
  .work-grid { grid-template-columns: 1fr; }
  .work-grid img.wide { grid-column: 1; }
}
@media (max-width: 480px) {
  .logo { font-size: 14px; }
  .nav-links { gap: 14px; }
  .nav-links a { font-size: 13px; }
  .hero-headline { font-size: clamp(34px, 9vw, 48px); }
}

</style>
</head>
<body>

<!-- HERO -->
<section class="hero">

  <nav>
    <div class="logo">Kajal <span class="last">Jain</span><span class="dot"></span></div>
    <ul class="nav-links">
      <li><a href="#work">Work</a></li>
      <li><a href="KajalJain_Resume26.pdf" target="_blank" rel="noopener">Resume</a></li>
      <li><a href="https://www.linkedin.com/in/kajal-jain8" target="_blank" rel="noopener">Linkedin</a></li>
      <li><a href="https://www.behance.net/KajalDesigns" target="_blank" rel="noopener">Behance</a></li>

  <div class="hero-inner">

  <div class="marquee">

      <img src="images/MtinAlPLKoMPxer4g6skV0V9fk.webp" alt="Fynd" class="logo-lg" aria-hidden="true" />

      <img src="images/McKinsey_Script_Mark_2019.svg.png" alt="McKinsey" aria-hidden="true" />

      <img src="images/Horizontal Logo_White.png" alt="Fractal" class="logo-lg" aria-hidden="true" />

</section>


<!-- WORK -->

    <img src="WMS.png" alt="Warehouse Management System" />

</body>
</html>
